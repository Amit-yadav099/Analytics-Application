<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CausalFunnel Demo Store</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: white;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero p {
      color: #64748b;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-size: 16px;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #e2e8f0;
    }

    .products {
      max-width: 1200px;
      margin: 50px auto;
      padding: 0 20px;

      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.1);
    }

    .image {
      height: 180px;
      background: linear-gradient(
        135deg,
        #60a5fa,
        #2563eb
      );
    }

    .card-content {
      padding: 20px;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .price {
      color: #2563eb;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .card button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #0f172a;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 40px;
      margin-top: 50px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <header>
    <h2>Demo Store</h2>

    <nav>
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Pricing</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Track User Behavior</h1>

    <p>
      Click around this page to generate events and
      visualize them in the analytics dashboard.
    </p>

    <button class="btn primary">
      Start Free Trial
    </button>

    <button class="btn secondary">
      Learn More
    </button>
  </section>

  <section class="products">

    <div class="card">
      <div class="image"></div>

      <div class="card-content">
        <h3>Analytics Pro</h3>
        <div class="price">$49/month</div>

        <button>Add To Cart</button>
      </div>
    </div>

    <div class="card">
      <div class="image"></div>

      <div class="card-content">
        <h3>Growth Suite</h3>
        <div class="price">$99/month</div>

        <button>Add To Cart</button>
      </div>
    </div>

    <div class="card">
      <div class="image"></div>

      <div class="card-content">
        <h3>Enterprise</h3>
        <div class="price">$199/month</div>

        <button>Add To Cart</button>
      </div>
    </div>

  </section>

  <footer>
    Demo page for analytics tracking assignment
  </footer>

  <script src="/tracker.js"></script>

</body>
</html>
